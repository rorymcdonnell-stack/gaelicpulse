<style>
  :root{
    --navy:#0B1F3A; --green:#2F8F5C; --gold:#C8A23B;
    --cream:#F7F6F2; --paper:#FDFDFC; --ink:#0B1F3A; --muted:#5B6B7F;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Archivo',system-ui,sans-serif;
    background:var(--navy);color:var(--cream);
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px 22px;
  }
  .mark{
    width:56px;height:56px;border-radius:50%;
    border:1.5px solid var(--gold);color:var(--gold);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:28px;
  }
  .mark svg{width:24px;height:24px}
  .eyebrow{
    font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--gold);margin-bottom:14px;font-weight:500;
  }
  h1{
    font-family:'Fraunces',Georgia,serif;font-weight:500;font-style:italic;
    font-size:clamp(32px,5vw,48px);line-height:1.15;letter-spacing:-.01em;
    margin-bottom:14px;
  }
  p{
    font-size:16px;line-height:1.55;color:rgba(247,246,242,.74);
    max-width:480px;margin:0 auto 28px;
  }
  a.home{
    display:inline-block;
    font-size:14px;font-weight:600;letter-spacing:.02em;
    padding:13px 22px;border-radius:2px;
    background:var(--gold);color:var(--navy);text-decoration:none;
    transition:background .15s;
  }
  a.home:hover{background:#d8b14a}
  .mantra{
    margin-top:40px;font-size:11px;letter-spacing:.06em;
    color:rgba(247,246,242,.4);font-weight:500;
  }
  .mantra b{color:rgba(247,246,242,.7);font-weight:600}
</style>
